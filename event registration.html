<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 24 Esports Registration</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#111;
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 0 20px #00fff7;
}

h1{
text-align:center;
color:#00fff7;
text-shadow:0 0 10px #00fff7;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
background:#222;
color:white;
outline:none;
}

input:focus{
box-shadow:0 0 8px #00fff7;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00fff7;
color:black;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00c2ff;
box-shadow:0 0 10px #00fff7;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<h1>🎮 FIFA 24 Tournament</h1>
<p style="text-align:center;">Esports Player Registration</p>

<form>

<label>Player Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Gamer Tag</label>
<input type="text" placeholder="Your in-game name" required>

<label>Email</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number" required>

<label>Platform</label>
<select required>
<option>PlayStation 5</option>
<option>PlayStation 4</option>
<option>Xbox Series X</option>
<option>PC</option>
</select>

<label>Favorite Team</label>
<input type="text" placeholder="Example: Real Madrid">

<label>Experience Level</label>
<select>
<option>Beginner</option>
<option>Intermediate</option>
<option>Pro Player</option>
</select>

<button type="submit">Register Now ⚡</button>

</form>

<div class="footer">
FIFA 24 Esports Championship
</div>

</div>

</body>
</html></html>
